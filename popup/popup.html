<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Refresh & Click</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="title-bar">
      <h1><img src="../icons/icon48.png" alt="icon" class="title-icon">Auto Refresh & Click</h1>
      <a href="https://github.com/piggyy/Auto-Refresh-Chrome-And-Click" target="_blank" class="github-link" title="GitHub">
        <svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
    </div>

    <!-- 状态区域 -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">已停止</span>
    </div>

    <!-- 刷新间隔设置 -->
    <div class="section">
      <label class="section-title">⏱ 刷新间隔</label>
      <div class="inline-group">
        <input type="number" id="intervalValue" min="1" value="30" class="input-number">
        <select id="intervalUnit" class="input-select">
          <option value="seconds">秒</option>
          <option value="minutes" selected>分钟</option>
          <option value="hours">小时</option>
        </select>
      </div>
    </div>

    <!-- 感兴趣的文字 -->
    <div class="section">
      <label class="section-title">🔍 感兴趣的文字（每行一个）</label>
      <textarea id="keywords" rows="5" placeholder="输入要监控的链接文字&#10;每行一个关键词&#10;支持通配符 * 和 ?&#10;如: 限时*优惠&#10;    新品??上市"></textarea>
    </div>

    <!-- 匹配选项 -->
    <div class="section">
      <label class="section-title">⚙ 匹配选项</label>
      <div class="match-options">
        <label class="checkbox-label" title="区分大小写匹配 (Aa)">
          <input type="checkbox" id="caseSensitive">
          <span class="option-icon">Aa</span>
          <span>区分大小写</span>
        </label>
        <label class="checkbox-label" title="全字匹配 (ab)">
          <input type="checkbox" id="wholeWord">
          <span class="option-icon">[ab]</span>
          <span>全字匹配</span>
        </label>
        <label class="checkbox-label" title="使用正则表达式 (.*)">
          <input type="checkbox" id="useRegex">
          <span class="option-icon">.*</span>
          <span>正则表达式</span>
        </label>
      </div>
    </div>

    <!-- 收藏夹选项 -->
    <div class="section">
      <label class="checkbox-label bookmark-option">
        <input type="checkbox" id="addToBookmarks">
        <span>📑 点击后加入收藏夹</span>
      </label>
      <div class="hint">收藏夹文件夹名为匹配到的关键词</div>
    </div>

    <!-- 点击行为 -->
    <div class="section">
      <label class="section-title">🖱 点击行为</label>
      <div class="match-options">
        <label class="radio-label">
          <input type="radio" name="clickBehavior" value="first" checked>
          <span>仅点击第一个匹配</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="clickBehavior" value="all">
          <span>点击所有匹配</span>
        </label>
      </div>
    </div>

    <!-- 匹配日志 -->
    <div class="section">
      <label class="section-title">📋 匹配日志</label>
      <div id="matchLog" class="match-log">
        <div class="log-empty">暂无匹配记录</div>
      </div>
      <div class="log-actions">
        <button id="clearLog" class="btn btn-small btn-secondary">清除日志</button>
      </div>
    </div>

    <!-- 缓存管理 -->
    <div class="section">
      <label class="section-title">🗂 已访问链接缓存</label>
      <div class="cache-info">
        <span>已记录 <strong id="visitedCount">0</strong> 个链接</span>
      </div>
      <div class="hint">已打开过的链接不会重复打开，清除缓存后可重新触发</div>
      <button id="clearCacheBtn" class="btn btn-small btn-warning">🗑 清除缓存</button>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
      <button id="startBtn" class="btn btn-primary">▶ 开始监控</button>
      <button id="stopBtn" class="btn btn-danger" disabled>⏹ 停止监控</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
