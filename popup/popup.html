<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Refresh & Click</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="title-bar">
      <h1><img src="../icons/icon48.png" alt="icon" class="title-icon">Auto Refresh & Click</h1>
      <div class="title-actions">
        <select id="langSelect" class="lang-select" title="Language"></select>
        <a href="https://github.com/piggyy/Auto-Refresh-Chrome-And-Click" target="_blank" class="github-link" title="GitHub">
          <svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
      </div>
    </div>

    <!-- 状态区域 + 操作按钮 -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText" data-i18n="statusStopped"></span>
      <div class="status-actions">
        <button id="startBtn" class="btn btn-primary btn-compact" data-i18n="btnStart"></button>
        <button id="stopBtn" class="btn btn-danger btn-compact" disabled data-i18n="btnStop"></button>
      </div>
    </div>

    <!-- 刷新间隔 -->
    <div class="section">
      <div class="inline-group">
        <label class="section-title-inline" data-i18n="refreshInterval"></label>
        <input type="number" id="intervalValue" min="1" value="30" class="input-number">
        <select id="intervalUnit" class="input-select">
          <option value="seconds" data-i18n="seconds"></option>
          <option value="minutes" selected data-i18n="minutes"></option>
          <option value="hours" data-i18n="hours"></option>
        </select>
      </div>
    </div>

    <!-- 感兴趣的文字 + 匹配选项 -->
    <div class="section">
      <div class="row-between" style="margin-bottom:6px;">
        <label class="section-title-inline" data-i18n="keywordsTitle"></label>
        <div class="inline-group match-icons">
          <label class="checkbox-label compact" data-i18n-title="caseSensitive">
            <input type="checkbox" id="caseSensitive">
            <span class="option-icon">Aa</span>
          </label>
          <label class="checkbox-label compact" data-i18n-title="wholeWord">
            <input type="checkbox" id="wholeWord">
            <span class="option-icon">[ab]</span>
          </label>
          <label class="checkbox-label compact" data-i18n-title="regex">
            <input type="checkbox" id="useRegex">
            <span class="option-icon">.*</span>
          </label>
        </div>
      </div>
      <textarea id="keywords" rows="3" data-i18n-placeholder="keywordsPlaceholder"></textarea>
    </div>

    <!-- 匹配后操作 + 点击行为 -->
    <div class="section">
      <label class="section-title" data-i18n="matchActions"></label>
      <div class="actions-grid">
        <label class="checkbox-label">
          <input type="checkbox" id="autoOpenTab" checked>
          <span data-i18n="autoOpenTab"></span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="addToBookmarks">
          <span data-i18n="addToBookmarks"></span>
        </label>
      </div>
      <div class="row-between sub-row">
        <div class="hint" data-i18n="bookmarkHint"></div>
        <div class="inline-group nowrap">
          <label class="radio-label compact nowrap">
            <input type="radio" name="clickBehavior" value="first" checked>
            <span data-i18n="clickFirst"></span>
          </label>
          <label class="radio-label compact nowrap">
            <input type="radio" name="clickBehavior" value="all">
            <span data-i18n="clickAll"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- 匹配日志 -->
    <div class="section">
      <div class="row-between">
        <label class="section-title-inline" data-i18n="matchLog"></label>
        <button id="clearLog" class="btn btn-tiny btn-secondary" data-i18n="clearLog"></button>
      </div>
      <div id="matchLog" class="match-log">
        <div class="log-empty" data-i18n="logEmpty"></div>
      </div>
    </div>

    <!-- 缓存管理 -->
    <div class="section">
      <div class="row-between">
        <span class="section-title-inline">
          <span data-i18n-template="cacheCount"><strong id="visitedCount">0</strong></span>
        </span>
        <button id="clearCacheBtn" class="btn btn-tiny btn-warning" data-i18n="clearCache"></button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
